services:
  pg:
    platform: linux/amd64
    build:
      context: config/docker/postgres
      dockerfile: DockerFile
    container_name: pg
    environment:
      - TZ=Europe/Moscow
      - POSTGRES_DB=visatoruss
      - POSTGRES_USER=visatoruss_user
      - POSTGRES_PASSWORD=visatoruss_pass
    volumes:
      - ./docker-data/db/pg:/var/lib/postgresql/data
      - ./config/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - '2345:2345'
    command: -p 2345
  rails:
    build:
      context: .
      dockerfile: config/docker/rails/DockerFile.development
    container_name: rails
    # No platform pin: build/run on the host arch so headless Chrome (Ferrum PDF)
    # runs natively. amd64-Chromium under QEMU emulation on Apple Silicon fails
    # with "lacks sse3" and won't start.
    ports:
      - '3000:3000'
    environment:
      - RAILS_ENV=development
    depends_on:
      - pg
    command: /bin/bash -c 'bundle install; ruby bin/rails db:create; ruby bin/rails db:migrate; rm -f tmp/pids/server.pid; bundle exec rails s -p 3000 -b 0.0.0.0'
    volumes:
      - .:/app
    env_file:
      - .env